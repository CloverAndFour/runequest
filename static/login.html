<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuneQuest - Login</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0804;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(45, 34, 21, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(26, 17, 8, 0.9) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200, 168, 78, 0.02) 2px, rgba(200, 168, 78, 0.02) 4px);
            font-family: 'Cinzel', Georgia, serif;
            color: #e8dcc8;
        }

        .login-container {
            width: 400px;
            padding: 40px;
            background: linear-gradient(180deg, #2d2215 0%, #1a1108 100%);
            border: 3px solid #a8884e;
            box-shadow:
                0 0 0 1px #1a1108,
                0 0 0 4px #6b5a3a,
                0 0 0 5px #1a1108,
                0 0 30px rgba(200, 168, 78, 0.15),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            margin-bottom: 8px;
        }

        .logo svg {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 0 8px rgba(200, 168, 78, 0.4));
        }

        h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 36px;
            color: #c8a84e;
            text-shadow: 0 0 10px rgba(200, 168, 78, 0.3), 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 12px;
            color: #8a7a5a;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            color: #a8884e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #1a1108;
            border: 2px solid #4a3a2a;
            color: #e8dcc8;
            font-family: 'Cinzel', Georgia, serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #c8a84e;
            box-shadow: 0 0 8px rgba(200, 168, 78, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(180deg, #5a4a2a 0%, #3a2a1a 100%);
            border: 2px solid #a8884e;
            color: #c8a84e;
            font-family: 'MedievalSharp', cursive;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: linear-gradient(180deg, #6a5a3a 0%, #4a3a2a 100%);
            box-shadow: 0 0 12px rgba(200, 168, 78, 0.3);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #cc4444;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .decorative-line {
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #a8884e, transparent);
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="#2d2215" stroke="#c8a84e" stroke-width="3"/>
                <text x="50" y="62" text-anchor="middle" font-family="serif" font-size="40" font-weight="bold" fill="#c8a84e">20</text>
            </svg>
        </div>
        <h1>RuneQuest</h1>
        <div class="subtitle">D&D Adventure Chat</div>
        <div class="decorative-line"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Adventurer Name</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Enter the Realm</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (!res.ok) {
                    errorMsg.textContent = 'Invalid credentials. The realm rejects you.';
                    return;
                }

                const data = await res.json();
                localStorage.setItem('rq_token', data.token);
                localStorage.setItem('rq_username', data.username);
                window.location.href = '/';
            } catch (err) {
                errorMsg.textContent = 'Connection failed. The realm is unreachable.';
            }
        });

        // If already logged in, redirect
        if (localStorage.getItem('rq_token')) {
            fetch('/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('rq_token') }
            }).then(r => {
                if (r.ok) window.location.href = '/';
            });
        }
    </script>
</body>
</html>
